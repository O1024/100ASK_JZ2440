# ==========================================================
# OpenOCD 配置文件 - JZ2440 (S3C2440)
# 适配器：OpenJTAG (基于 FT2232 芯片)
# ==========================================================

# 1. 调试驱动配置
adapter driver ftdi
# 指定 OpenJTAG 的 USB 厂商 ID (VID) 和产品 ID (PID)
ftdi vid_pid 0x1457 0x5118

# 2. FTDI 信号布局 (Layout) 初始化
# 设置 FT2232 芯片内部 GPIO 的初始输出值和方向
# 这直接关联到 JTAG 排线上的 TCK, TMS, TDI, TDO 等信号
ftdi layout_init 0x0508 0x0f1b
# 定义复位信号对应的 GPIO 位
ftdi layout_signal nTRST -data 0x0200 -oe 0x0200
ftdi layout_signal nSRST -data 0x0800 -oe 0x0800

# 3. 传输协议
transport select jtag

# 4. 时钟频率配置 (重要)
# 降速至 100kHz 以应对 mpsse_flush 超时问题
adapter speed 100

# 5. 复位策略 (Reset Configuration)
# trst_only: 表示硬件仅连接了 nTRST (TAP复位)，未连接 nSRST (系统复位线)。
# OpenOCD 将通过 JTAG 指令请求 CPU 进行“软复位”。
# 若调试器无法 Halt 核心，请在启动时手动按下板载 Reset 键。
reset_config trst_only

# 6. 加载目标芯片定义
# 引用 OpenOCD 标准库中的 S3C2440 配置文件
source [find target/samsung_s3c2440.cfg]

# 7. 调试工作区 (Work Area) 配置
# 改回内部 SRAM (4KB)，防止 SDRAM 未初始化时访问导致挂起
$_TARGETNAME configure -work-area-phys 0x40000000 -work-area-size 0x1000 -work-area-backup 0

# 8. 稳定性与性能优化
# 禁用 DCC 下载：DCC 模式在低速 JTAG 下极不稳定，容易报 "DCC write failed"
arm7_9 dcc_downloads disable
# 开启快速内存访问：在非 DCC 模式下提升 GDB 下载程序的效率
arm7_9 fast_memory_access enable
# 设置轮询周期：100ms 检查一次 CPU 状态，确保 GDB 能及时感知 Halt
poll_period 100

# 9. 定义烧录辅助逻辑
# 在烧录前关闭 MMU 和 Cache
$_TARGETNAME configure -event reset-init {
    echo "--- 正在关闭 MMU 和 D-Cache ---"
    # CP15 c1 寄存器：0x00000078 彻底关闭 MMU(bit0) 和 D-Cache(bit2)
    arm920t cp15 0 0 1 0 0x00000078
}

# 10. Nand Flash 配置
# 定义 S3C2440 内部 Nand 控制器
nand device s3c2440_bank0 s3c2440 $_TARGETNAME

# 11. Nor Flash 配置
# JZ2440 使用 MX29LV160 (2MB), 挂载在 Bank 0 (地址 0x0)
# 语法: flash bank <name> <driver> <base> <size> <chip_width> <bus_width> <target> [options]
flash bank $_CHIPNAME.norflash cfi 0x00000000 0x00200000 2 2 $_TARGETNAME

# 12. 极端情况优化
# 增加 Halt 超时时间到 5000ms
$_TARGETNAME configure -event gdb-attach { halt }
adapter srst delay 200
jtag_ntrst_delay 200

# 9. 执行初始化
init
echo "--------------------------------------------------------"
echo " OpenOCD for JZ2440 准备就绪。"
echo " 策略：仅 TRST 复位。若连接超时，请配合手动按 Reset 键。"
echo "--------------------------------------------------------"
